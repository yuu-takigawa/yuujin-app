<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>Yuujin・友人</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#E85B3A" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Yuujin" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <link rel="icon" href="/favicon.ico" />

    <!-- Preconnect to API -->
    <link rel="preconnect" href="https://api.yuujin.cc" />

    <style id="expo-reset">
      html,
      body {
        height: 100%;
        -webkit-text-size-adjust: 100%;
        -webkit-tap-highlight-color: transparent;
        overscroll-behavior: none;
      }
      body {
        overflow: hidden;
        position: fixed;
        width: 100%;
        margin: 0;
      }
      input:focus, textarea:focus, [contenteditable]:focus {
        outline: none !important;
        box-shadow: none !important;
      }
      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }

      /* Inline splash — renders instantly before any JS loads */
      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #fff;
        z-index: 9999;
        transition: opacity 0.3s ease;
      }
      #splash.hide { opacity: 0; pointer-events: none; }
      #splash-logo { width: 160px; height: 32px; }
      #splash-spinner {
        margin-top: 24px;
        width: 28px;
        height: 28px;
        border: 3px solid #f0f0f0;
        border-top-color: #E85B3A;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>

  <body>
    <!-- Inline splash: renders instantly before any JS loads -->
    <div id="splash">
      <img id="splash-logo" src="/logo.svg" alt="Yuujin" width="160" height="32" />
      <div id="splash-spinner"></div>
    </div>

    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script>
      // Hide splash once React root renders
      var observer = new MutationObserver(function() {
        var root = document.getElementById('root');
        if (root && root.children.length > 0) {
          var splash = document.getElementById('splash');
          if (splash) {
            splash.classList.add('hide');
            setTimeout(function() { splash.remove(); }, 300);
          }
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('root'), { childList: true });
    </script>
    <!-- JS bundle will be injected by deploy script -->
  </body>
</html>
